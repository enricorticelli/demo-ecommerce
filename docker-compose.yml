services:
  postgres:
    image: postgres:16-alpine
    container_name: cqrs-postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cqrs-rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 15

  mongodb:
    image: mongo:7
    container_name: cqrs-mongo-readmodels
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u ${MONGO_USER:-mongo} -p ${MONGO_PASSWORD:-mongo} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  catalog-api:
    container_name: cqrs-catalog-api
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
    environment: &common-env
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CATALOG_DB: ${CATALOG_DB:-catalogdb}
      CART_DB: ${CART_DB:-cartdb}
      ORDER_DB: ${ORDER_DB:-orderdb}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-warehousedb}
      PAYMENT_DB: ${PAYMENT_DB:-paymentdb}
      SHIPPING_DB: ${SHIPPING_DB:-shippingdb}
      USER_DB: ${USER_DB:-userdb}
      CART_READ_DB: ${CART_READ_DB:-cartread}
      ORDER_READ_DB: ${ORDER_READ_DB:-orderread}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-mongo}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mongo}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck: &api-health
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  cart-api:
    container_name: cqrs-cart-api
    build:
      context: .
      dockerfile: src/Cart.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck: *api-health

  order-api:
    container_name: cqrs-order-api
    build:
      context: .
      dockerfile: src/Order.Api/Dockerfile
    environment:
      <<: *common-env
      CART_API_URL: http://cart-api:8080
      WAREHOUSE_API_URL: http://warehouse-api:8080
      PAYMENT_API_URL: http://payment-api:8080
      SHIPPING_API_URL: http://shipping-api:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      cart-api:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck: *api-health

  warehouse-api:
    container_name: cqrs-warehouse-api
    build:
      context: .
      dockerfile: src/Warehouse.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *api-health

  payment-api:
    container_name: cqrs-payment-api
    build:
      context: .
      dockerfile: src/Payment.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *api-health

  shipping-api:
    container_name: cqrs-shipping-api
    build:
      context: .
      dockerfile: src/Shipping.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *api-health

  user-api:
    container_name: cqrs-user-api
    build:
      context: .
      dockerfile: src/User.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *api-health

  gateway-api:
    container_name: cqrs-gateway-api
    build:
      context: .
      dockerfile: src/Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
    ports:
      - "8080:8080"
    depends_on:
      catalog-api:
        condition: service_healthy
      cart-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
      warehouse-api:
        condition: service_healthy
      shipping-api:
        condition: service_healthy
      user-api:
        condition: service_healthy
    healthcheck: *api-health

  frontend-web:
    container_name: cqrs-frontend-web
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    environment:
      PUBLIC_GATEWAY_URL: http://localhost:8080
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 250
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  rabbitmq-data:
  mongodb-data:
