x-api-infra-dependencies: &api-infra-dependencies
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  aspire-dashboard:
    condition: service_healthy

x-container-logging: &container-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *container-logging
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: catalog_db,cart_db,order_db,payment_db,shipping_db,warehouse_db,communication_db
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/01-init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  rabbitmq:
    <<: *container-logging
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${MessageBus__Username}
      RABBITMQ_DEFAULT_PASS: ${MessageBus__Password}
    ports:
      - "${RABBITMQ_HOST_PORT:-55672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15673}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  keycloak:
    <<: *container-logging
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      GATEWAY_BACKOFFICE_CLIENT_SECRET: ${GATEWAY_BACKOFFICE_CLIENT_SECRET:-local-dev-gateway-secret}
    ports:
      - "127.0.0.1:${KEYCLOAK_HOST_PORT:-18081}:8080"
    volumes:
      - ./infrastructure/keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  aspire-dashboard:
    <<: *container-logging
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "${ASPIRE_DASHBOARD_HOST_PORT:-18890}:18888"
      - "${ASPIRE_OTLP_HOST_PORT:-18891}:18889"
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 10s
      timeout: 5s
      retries: 20

  catalog-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: catalog-api
    depends_on:
      <<: *api-infra-dependencies
    healthcheck: &api-health
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  cart-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Cart.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: cart-api
    depends_on:
      <<: *api-infra-dependencies
    healthcheck: *api-health

  order-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Order.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: order-api
    depends_on:
      <<: *api-infra-dependencies
      cart-api:
        condition: service_healthy
    healthcheck: *api-health

  warehouse-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Warehouse.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: warehouse-api
    depends_on:
      <<: *api-infra-dependencies
    healthcheck: *api-health

  payment-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Payment.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: payment-api
    depends_on:
      <<: *api-infra-dependencies
    healthcheck: *api-health

  payment-mock-gateway:
    <<: *container-logging
    build:
      context: .
      dockerfile: frontend/payment-mock-gateway/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: payment-mock-gateway
    ports:
      - "127.0.0.1:${PAYMENT_MOCK_GATEWAY_HOST_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 20

  shipping-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Shipping.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: shipping-api
    depends_on:
      <<: *api-infra-dependencies
    healthcheck: *api-health

  communication-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Communication.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: communication-api
    depends_on:
      <<: *api-infra-dependencies
      mailpit:
        condition: service_started
    healthcheck: *api-health

  mailpit:
    <<: *container-logging
    image: axllent/mailpit:v1.26.2
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_HOST_PORT:-11025}:1025"
      - "127.0.0.1:${MAILPIT_UI_HOST_PORT:-18025}:8025"

  gateway-api:
    <<: *container-logging
    build:
      context: .
      dockerfile: src/Gateway.Api/Dockerfile
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: gateway-api
      Gateway__Auth__Authority: http://keycloak:8080/realms/demo-ecommerce
      Gateway__Auth__Audience: gateway-backoffice
      Gateway__Auth__ClientId: gateway-backoffice
      Gateway__Auth__ClientSecret: ${GATEWAY_BACKOFFICE_CLIENT_SECRET:-local-dev-gateway-secret}
      Gateway__Auth__RequireHttpsMetadata: "false"
      Gateway__Auth__IntrospectionCacheSeconds: 45
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-18080}:8080"
    depends_on:
      <<: *api-infra-dependencies
      keycloak:
        condition: service_healthy
      catalog-api:
        condition: service_healthy
      cart-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
      warehouse-api:
        condition: service_healthy
      shipping-api:
        condition: service_healthy
      communication-api:
        condition: service_healthy
    healthcheck: *api-health

  frontend-web:
    <<: *container-logging
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:${FRONTEND_WEB_HOST_PORT:-13000}:3000"
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  backoffice-web:
    <<: *container-logging
    build:
      context: .
      dockerfile: frontend/backoffice/Dockerfile
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    environment:
      VITE_BACKOFFICE_API_ENTRYPOINT: http://localhost:${GATEWAY_HOST_PORT:-18080}
      VITE_BACKOFFICE_OPENAPI_URL: http://localhost:${GATEWAY_HOST_PORT:-18080}/openapi/backoffice.json
      VITE_KEYCLOAK_AUTHORITY: http://localhost:${KEYCLOAK_HOST_PORT:-18081}/realms/demo-ecommerce
      VITE_KEYCLOAK_CLIENT_ID: backoffice-web
      BACKOFFICE_API_ENTRYPOINT: http://localhost:${GATEWAY_HOST_PORT:-18080}
      BACKOFFICE_OPENAPI_URL: http://localhost:${GATEWAY_HOST_PORT:-18080}/openapi/backoffice.json
      BACKOFFICE_KEYCLOAK_AUTHORITY: http://localhost:${KEYCLOAK_HOST_PORT:-18081}/realms/demo-ecommerce
      BACKOFFICE_KEYCLOAK_CLIENT_ID: backoffice-web
    volumes:
      - ./frontend/backoffice:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:${BACKOFFICE_WEB_HOST_PORT:-13001}:3001"
    depends_on:
      gateway-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3001 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  rabbitmq-data:
  keycloak-data:
