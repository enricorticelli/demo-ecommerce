services:
  catalog-api:
    container_name: cqrs-catalog-api
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
    environment: &common-env
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PAYMENT_HOSTED_GATEWAY_BASE_URL: ${PAYMENT_HOSTED_GATEWAY_BASE_URL:-http://localhost:8080/api/payment}
      PAYMENT_STRIPE_CARD_REDIRECT_URL_TEMPLATE: ${PAYMENT_STRIPE_CARD_REDIRECT_URL_TEMPLATE:-}
      PAYMENT_PAYPAL_REDIRECT_URL_TEMPLATE: ${PAYMENT_PAYPAL_REDIRECT_URL_TEMPLATE:-}
      PAYMENT_SATISPAY_REDIRECT_URL_TEMPLATE: ${PAYMENT_SATISPAY_REDIRECT_URL_TEMPLATE:-}
    healthcheck: &api-health
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  cart-api:
    container_name: cqrs-cart-api
    build:
      context: .
      dockerfile: src/Cart.Api/Dockerfile
    environment:
      <<: *common-env
    healthcheck: *api-health

  order-api:
    container_name: cqrs-order-api
    build:
      context: .
      dockerfile: src/Order.Api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      cart-api:
        condition: service_healthy
    healthcheck: *api-health

  warehouse-api:
    container_name: cqrs-warehouse-api
    build:
      context: .
      dockerfile: src/Warehouse.Api/Dockerfile
    environment:
      <<: *common-env
    healthcheck: *api-health

  payment-api:
    container_name: cqrs-payment-api
    build:
      context: .
      dockerfile: src/Payment.Api/Dockerfile
    environment:
      <<: *common-env
    healthcheck: *api-health

  shipping-api:
    container_name: cqrs-shipping-api
    build:
      context: .
      dockerfile: src/Shipping.Api/Dockerfile
    environment:
      <<: *common-env
    healthcheck: *api-health

  gateway-api:
    container_name: cqrs-gateway-api
    build:
      context: .
      dockerfile: src/Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
    ports:
      - "8080:8080"
    depends_on:
      catalog-api:
        condition: service_healthy
      cart-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
      warehouse-api:
        condition: service_healthy
      shipping-api:
        condition: service_healthy
    healthcheck: *api-health

  frontend-web:
    container_name: cqrs-frontend-web
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    environment:
      PUBLIC_GATEWAY_URL: http://localhost:8080
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 250
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  frontend-admin:
    container_name: cqrs-frontend-admin
    build:
      context: .
      dockerfile: frontend/admin/Dockerfile
    environment:
      PUBLIC_GATEWAY_URL: http://localhost:8080
      HOST: 0.0.0.0
      PORT: 3001
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 250
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3001 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
