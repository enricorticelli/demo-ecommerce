x-dotnet-hotreload-common: &dotnet-hotreload-common
  working_dir: /src
  volumes:
    - ./:/src
    - dotnet-nuget:/root/.nuget/packages
  environment:
    ASPNETCORE_ENVIRONMENT: Development
    DOTNET_USE_POLLING_FILE_WATCHER: "1"
  healthcheck:
    test: ["CMD-SHELL", "dotnet --version >/dev/null 2>&1 || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 20

services:
  catalog-api:
    <<: *dotnet-hotreload-common
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
      target: build
    command:
      - /bin/sh
      - -c
      - dotnet restore src/Catalog.Api/Catalog.Api.csproj && dotnet watch --project src/Catalog.Api/Catalog.Api.csproj run --no-launch-profile --urls http://0.0.0.0:8080

